# Development Override Configuration
version: '3.8'

services:
  postgres:
    environment:
      # Development-specific settings
      POSTGRES_LOG_STATEMENT: all
      POSTGRES_LOG_MIN_DURATION_STATEMENT: 0
    volumes:
      # Mount SQL files for development
      - ./database/init:/docker-entrypoint-initdb.d/01-init:ro
      - ./database/rls_policies:/docker-entrypoint-initdb.d/02-rls:ro
      - ./database:/docker-entrypoint-initdb.d/03-data:ro
    command: >
      postgres
      -c log_statement=all
      -c log_destination=stderr
      -c log_min_messages=info
      -c log_min_duration_statement=0
      -c shared_preload_libraries=pg_stat_statements
      -c pg_stat_statements.track=all

  # Development Database with Test Data
  postgres-test:
    image: postgres:15-alpine
    container_name: haraka_postgres_test
    environment:
      POSTGRES_DB: haraka_test_db
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_password
    ports:
      - "5433:5432"
    volumes:
      - ./database:/docker-entrypoint-initdb.d:ro
    networks:
      - haraka_network
    profiles:
      - testing

  # Security Testing Tools
  security-scanner:
    image: owasp/zap2docker-stable
    container_name: haraka_security_scanner
    volumes:
      - ./security-reports:/zap/wrk:rw
    networks:
      - haraka_network
    profiles:
      - security-testing
    command: zap-baseline.py -t http://localhost:3000 -r security-report.html

volumes:
  # Development-specific volumes
  postgres_test_data:
    driver: local