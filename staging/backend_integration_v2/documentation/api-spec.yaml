            analysis_metadata:
              type: object
              properties:
                processing_time:
                  type: number
                ai_confidence:
                  type: number
                detected_exercises:
                  type: array
                  items:
                    type: string
            comparison:
              type: object
              properties:
                class_average:
                  type: number
                performance_vs_class:
                  type: number
            history:
              type: array
              items:
                $ref: '#/components/schemas/Analysis'

    Notification:
      type: object
      properties:
        id:
          type: integer
          example: 1
        title:
          type: string
          example: "تنبيه: أداء منخفض"
        message:
          type: string
          example: "الطالب محمد علي حصل على نتيجة 55% وهي أقل من المطلوب"
        category:
          type: string
          enum: [عام, أداء, تنبيه, تحديث, تذكير, طارئ]
          example: "تنبيه"
        priority:
          type: string
          enum: [منخفض, متوسط, عالي, عاجل, حرج]
          example: "عالي"
        is_read:
          type: boolean
          example: false
        action_required:
          type: boolean
          example: true
        related_student_id:
          type: integer
          nullable: true
          example: 1
        created_at:
          type: string
          format: date-time

    StudentReport:
      type: object
      properties:
        student:
          $ref: '#/components/schemas/Student'
        period:
          type: object
          properties:
            start_date:
              type: string
              format: date
            end_date:
              type: string
              format: date
        summary:
          type: object
          properties:
            total_analyses:
              type: integer
            average_score:
              type: number
            improvement_rate:
              type: number
            rank_in_class:
              type: integer
        performance_breakdown:
          type: object
          properties:
            balance:
              type: number
            speed:
              type: number
            accuracy:
              type: number
            coordination:
              type: number
            flexibility:
              type: number
            endurance:
              type: number
        trend_analysis:
          type: object
          properties:
            direction:
              type: string
              enum: [متحسن, مستقر, متراجع]
            change_percentage:
              type: number
        recommendations:
          type: array
          items:
            type: string
        generated_at:
          type: string
          format: date-time

    ClassReport:
      type: object
      properties:
        class_name:
          type: string
        period:
          type: object
          properties:
            start_date:
              type: string
              format: date
            end_date:
              type: string
              format: date
        summary:
          type: object
          properties:
            total_students:
              type: integer
            total_analyses:
              type: integer
            class_average:
              type: number
            students_need_followup:
              type: integer
        performance_distribution:
          type: object
          properties:
            excellent:
              type: integer
            good:
              type: integer
            average:
              type: integer
            needs_improvement:
              type: integer
        top_performers:
          type: array
          items:
            $ref: '#/components/schemas/Student'
        improvement_areas:
          type: array
          items:
            type: string
        generated_at:
          type: string
          format: date-time

    SchoolReport:
      type: object
      properties:
        school_name:
          type: string
        period:
          type: object
          properties:
            start_date:
              type: string
              format: date
            end_date:
              type: string
              format: date
        summary:
          type: object
          properties:
            total_students:
              type: integer
            total_classes:
              type: integer
            total_analyses:
              type: integer
            school_average:
              type: number
        class_rankings:
          type: array
          items:
            type: object
            properties:
              class_name:
                type: string
              average_score:
                type: number
              rank:
                type: integer
        trends:
          type: object
          properties:
            monthly_improvement:
              type: number
            yearly_growth:
              type: number
        generated_at:
          type: string
          format: date-time

    CreateStudentRequest:
      type: object
      required:
        - student_id
        - student_name
        - student_code
        - class_name
        - grade_level
      properties:
        student_id:
          type: integer
          example: 12345
        student_name:
          type: string
          example: "محمد علي أحمد"
        student_code:
          type: string
          example: "STU001"
        class_name:
          type: string
          example: "الصف الخامس أ"
        grade_level:
          type: integer
          minimum: 1
          maximum: 12
          example: 5
        birth_date:
          type: string
          format: date
          nullable: true
        gender:
          type: string
          enum: [ذكر, أنثى]
        height_cm:
          type: integer
          nullable: true
        weight_kg:
          type: number
          format: float
          nullable: true
        medical_conditions:
          type: array
          items:
            type: string
        emergency_contact:
          type: object
          properties:
            name:
              type: string
            phone:
              type: string
            relationship:
              type: string

    UpdateStudentRequest:
      type: object
      properties:
        student_name:
          type: string
        class_name:
          type: string
        grade_level:
          type: integer
          minimum: 1
          maximum: 12
        birth_date:
          type: string
          format: date
          nullable: true
        gender:
          type: string
          enum: [ذكر, أنثى]
        height_cm:
          type: integer
          nullable: true
        weight_kg:
          type: number
          format: float
          nullable: true
        medical_conditions:
          type: array
          items:
            type: string
        emergency_contact:
          type: object
          properties:
            name:
              type: string
            phone:
              type: string
            relationship:
              type: string
        status:
          type: string
          enum: [نشط, معلق, محول, متخرج, منسحب]

    Pagination:
      type: object
      properties:
        current_page:
          type: integer
          example: 1
        per_page:
          type: integer
          example: 20
        total_pages:
          type: integer
          example: 5
        total_count:
          type: integer
          example: 95
        has_next:
          type: boolean
          example: true
        has_previous:
          type: boolean
          example: false

    Error:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: string
          example: "رسالة الخطأ"
        error_code:
          type: string
          example: "VALIDATION_ERROR"
        timestamp:
          type: string
          format: date-time

    ValidationError:
      allOf:
        - $ref: '#/components/schemas/Error'
        - type: object
          properties:
            validation_errors:
              type: array
              items:
                type: object
                properties:
                  field:
                    type: string
                  message:
                    type: string
                  code:
                    type: string

  responses:
    UnauthorizedError:
      description: غير مصرح - مطلوب تسجيل الدخول
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            success: false
            error: "مطلوب تسجيل الدخول"
            error_code: "UNAUTHORIZED"

    ForbiddenError:
      description: ممنوع - ليس لديك صلاحية
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            success: false
            error: "ليس لديك صلاحية للوصول لهذا المورد"
            error_code: "FORBIDDEN"

    NotFoundError:
      description: غير موجود
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            success: false
            error: "المورد المطلوب غير موجود"
            error_code: "NOT_FOUND"

    ValidationError:
      description: خطأ في التحقق من صحة البيانات
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationError'
          example:
            success: false
            error: "بيانات غير صحيحة"
            error_code: "VALIDATION_ERROR"
            validation_errors:
              - field: "student_name"
                message: "اسم الطالب مطلوب"
                code: "REQUIRED"
              - field: "grade_level"
                message: "المستوى الدراسي يجب أن يكون بين 1 و 12"
                code: "OUT_OF_RANGE"

    RateLimitError:
      description: تم تجاوز الحد المسموح من الطلبات
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            success: false
            error: "تم تجاوز الحد المسموح من الطلبات"
            error_code: "RATE_LIMIT_EXCEEDED"
      headers:
        X-RateLimit-Limit:
          schema:
            type: integer
          description: الحد الأقصى للطلبات
        X-RateLimit-Remaining:
          schema:
            type: integer
          description: عدد الطلبات المتبقية
        X-RateLimit-Reset:
          schema:
            type: integer
          description: وقت إعادة التعيين (ثواني)

